version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    expose:
      - "3001"
    env_file:
      - ./configs/.env.prod
    environment:
      - BETTERSTACK_COLLECTOR_SECRET=${BETTERSTACK_COLLECTOR_SECRET}
      - DATABASE_URL=postgresql://portfolio:portfolio@database:5432/portfolio?sslmode=disable
    volumes:
      - ./configs/.env.prod:/app/configs/.env:ro
    depends_on:
      - database
    networks:
      - portfolio-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=portfolio-backend"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
        - VITE_DEFAULT_EMAIL=lucas.biason@foxcodesoftware.com
        - VITE_DEFAULT_PASSWORD=Portfolio2025Secure!
    container_name: portfolio-frontend
    expose:
      - "80"
    environment:
      - BETTERSTACK_COLLECTOR_SECRET=${BETTERSTACK_COLLECTOR_SECRET}
    depends_on:
      - backend
    networks:
      - portfolio-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=portfolio-frontend"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=portfolio-nginx"
    # Add external_links to resolve ML containers
    extra_hosts:
      - "ml-sales-api:host-gateway"
      - "ml-sales-frontend:host-gateway"
      - "ml-spam-api:host-gateway"
      - "ml-spam-frontend:host-gateway"
      - "threat-modeling-frontend:host-gateway"
      - "threat-modeling-service:host-gateway"

  database:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - portfolio-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=portfolio-db"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  portfolio-net:
    driver: bridge

volumes:
  certbot-data:
  pgdata:


