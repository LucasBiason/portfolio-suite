version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    ports:
      - "3001:3001"
    env_file:
      - ./configs/.env
    environment:
      - DATABASE_URL=postgresql://portfolio:portfolio@database:5432/portfolio?schema=public
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      database:
        condition: service_healthy
    networks:
      - portfolio-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    ports:
      - "5173:80"
    env_file:
      - ./configs/.env
    depends_on:
      - backend
    networks:
      - portfolio-net
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  portfolio-net:
    driver: bridge

volumes:
  pgdata:


