# Frontend - lucasbiason.com (HTTP)
# HTTPS desabilitado temporariamente - certificados SSL não configurados
server {
    listen 80;
    server_name lucasbiason.com www.lucasbiason.com;
    # Redirect HTTPS removido - servindo apenas HTTP até certificados serem configurados

    # ML Sales Forecasting - API routes (must be before /api)
    location /ml-sales-forecasting-api {
        rewrite ^/ml-sales-forecasting-api/(.*) /$1 break;
        proxy_pass http://ml-sales-api:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Portfolio static images - serve from backend first (images are in backend/public/assets/img/)
    location ~ ^/assets/img/(.*)$ {
        proxy_pass http://portfolio-backend:3001/assets/img/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache images
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ML Spam Classifier - Assets (must be before /assets to avoid conflicts)
    location ~ ^/ml-spam-classifier/assets/ {
        proxy_pass http://ml-spam-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ML Sales Forecasting - Assets (must be before /assets to avoid conflicts)
    location ~ ^/ml-sales-forecasting/assets/ {
        proxy_pass http://ml-sales-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Assets from root path - try Portfolio Frontend first, then ML services, then Backend
    # This handles absolute paths like /assets/index-*.js from frontend HTML
    location ~ ^/assets/(.*)$ {
        # Try Portfolio frontend first (most common case)
        proxy_pass http://portfolio-frontend:80/assets/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # If Portfolio frontend returns 404, try ML Spam frontend
        proxy_intercept_errors on;
        error_page 404 = @ml_spam_frontend_assets;
        
        # Cache assets
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location @ml_spam_frontend_assets {
        # Try ML Spam frontend
        proxy_pass http://ml-spam-frontend:80/assets/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # If ML Spam frontend returns 404, try ML Sales frontend
        proxy_intercept_errors on;
        error_page 404 = @ml_sales_frontend_assets;
        
        # Cache assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location @ml_sales_frontend_assets {
        # Try ML Sales frontend
        proxy_pass http://ml-sales-frontend:80/assets/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # If ML Sales frontend returns 404, try portfolio backend (for images)
        proxy_intercept_errors on;
        error_page 404 = @portfolio_backend_assets;
        
        # Cache assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location @portfolio_backend_assets {
        # Fallback to portfolio backend (for uploaded assets like images)
        proxy_pass http://portfolio-backend:3001/assets/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Portfolio uploads - serve user uploaded files from backend
    location /uploads {
        proxy_pass http://portfolio-backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache uploads
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check (sem /api)
    location = /api/health {
        proxy_pass http://portfolio-backend:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Portfolio API routes (must be before ML routes to avoid conflicts)
    location /api {
        proxy_pass http://portfolio-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        
        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Expose-Headers "Authorization" always;
        
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }


    # ML Spam Classifier - Frontend routes (exact match, must be before /)
    location = /ml-spam-classifier {
        return 301 /ml-spam-classifier/;
    }

    location ~ ^/ml-spam-classifier(/.*)?$ {
        # Proxy to frontend container, preserving the full path
        proxy_pass http://ml-spam-frontend:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Handle SPA routing
        proxy_redirect off;
    }

    # ML Sales Forecasting - Frontend routes (exact match, must be before /)
    location = /ml-sales-forecasting {
        return 301 /ml-sales-forecasting/;
    }

    location ~ ^/ml-sales-forecasting(/.*)?$ {
        # Proxy to frontend container, preserving the full path
        proxy_pass http://ml-sales-frontend:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Handle SPA routing
        proxy_redirect off;
    }

    # Portfolio Frontend routes (default - must be last)
    # Use container name instead of service name to avoid DNS conflicts
    location / {
        proxy_pass http://portfolio-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        
        # Important: Preserve original request for SPA routing
        proxy_redirect off;
        proxy_buffering off;
        
        # Headers for mobile compatibility
        proxy_set_header Accept-Encoding "";
        proxy_set_header User-Agent $http_user_agent;
        
        # No cache for HTML pages
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Explicitly disable cache for index.html
    location = /index.html {
        proxy_pass http://portfolio-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}



