# Frontend - lucasbiason.com (HTTP - Redirect to HTTPS)
server {
    listen 80;
    server_name lucasbiason.com www.lucasbiason.com;
    return 301 https://$server_name$request_uri;
}

# Frontend - lucasbiason.com (HTTPS)
server {
    listen 443 ssl http2;
    server_name lucasbiason.com www.lucasbiason.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# Backend API - api.lucasbiason.com (HTTP - Redirect to HTTPS)
server {
    listen 80;
    server_name api.lucasbiason.com;
    return 301 https://$server_name$request_uri;
}

# Backend API - api.lucasbiason.com (HTTPS)
server {
    listen 443 ssl http2;
    server_name api.lucasbiason.com;

    ssl_certificate /etc/nginx/ssl/api-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}



